---

services:
  pardis:
    image: ghcr.io/pardisontop/pardis-ui:latest
    container_name: pardis-ui
    hostname: yourhostname
    volumes:
      - $PWD/db/:/etc/pardis-ui/
      - $PWD/cert/:/root/cert/
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
    tty: true
    network_mode: host
    restart: unless-stopped
